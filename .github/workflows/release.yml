name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  CUDA_VERSION: '12.8.0'
  CMAKE_VERSION: '3.30'

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: 'network'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -G Ninja `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Prepare Release Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          }

          $packageName = "ZorbaSplatStudio-$version-win64"
          $packageDir = "release/$packageName"

          New-Item -ItemType Directory -Force -Path "$packageDir/bin"

          # Copy executable
          if (Test-Path "build/LichtFeld-Studio.exe") {
            Copy-Item "build/LichtFeld-Studio.exe" "$packageDir/bin/ZorbaSplatStudio.exe"
          } elseif (Test-Path "build/Release/LichtFeld-Studio.exe") {
            Copy-Item "build/Release/LichtFeld-Studio.exe" "$packageDir/bin/ZorbaSplatStudio.exe"
          }

          # Copy DLLs
          Get-ChildItem -Path "build" -Filter "*.dll" -Recurse | Copy-Item -Destination "$packageDir/bin/"

          # Copy resources
          if (Test-Path "resources") {
            Copy-Item -Recurse "resources" "$packageDir/"
          }

          # Copy shaders if present
          if (Test-Path "build/shaders") {
            Copy-Item -Recurse "build/shaders" "$packageDir/bin/"
          }

          # Copy documentation
          Copy-Item "README.md" "$packageDir/"
          Copy-Item "LICENSE" "$packageDir/"
          if (Test-Path "THIRD_PARTY_LICENSES.md") {
            Copy-Item "THIRD_PARTY_LICENSES.md" "$packageDir/"
          }

          # Create launcher script
          @"
          @echo off
          cd /d "%~dp0bin"
          start ZorbaSplatStudio.exe %*
          "@ | Out-File -FilePath "$packageDir/Launch.bat" -Encoding ASCII

          # Create ZIP
          Compress-Archive -Path "$packageDir/*" -DestinationPath "release/$packageName.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZorbaSplatStudio-win64
          path: release/*.zip

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ZORBA Splat Studio ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
          body: |
            ## ZORBA Splat Studio ${{ steps.version.outputs.version }}

            High-performance 3D Gaussian Splatting trainer and viewer.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows 64-bit | `ZorbaSplatStudio-${{ steps.version.outputs.version }}-win64.zip` |

            ### Requirements

            - **GPU**: NVIDIA with CUDA 12.8+ support
            - **Driver**: NVIDIA driver version 570 or newer
            - **OS**: Windows 10/11

            ### Quick Start

            1. Download and extract the ZIP
            2. Run `Launch.bat` or `bin/ZorbaSplatStudio.exe`
            3. To train: `ZorbaSplatStudio.exe -d /path/to/colmap --output-path output --strategy mcmc`
            4. To view: `ZorbaSplatStudio.exe --view /path/to/splat.ply`

            ### What's New

            See the [CHANGELOG](https://github.com/AniketMan/ZorbaSplatStudio/blob/master/CHANGELOG.md) for details.
